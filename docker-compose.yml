services:
   frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: tomato-food-app-frontend:local
    container_name: frontend
    ports:
     - "3000:80"
    networks:
      - shop
   admin:
     build:
       context: ./admin
       dockerfile: Dockerfile
     image: tomato-food-app-admin:local
     container_name: admin
     ports:
      - "3001:80"
     networks:
       - shop
   backend:
     build:
       context: ./backend
       dockerfile: Dockerfile
     image: tomato-food-app-backend:local
     container_name: backend
     ports:
      - "4000:4000"
     volumes:
       - ./backend/uploads:/apps/uploads
     networks:
       - shop
     restart: always
     environment:
       MONGO_URI: mongodb://mongodb:27017/store
       JWT_SECRET: "random#secret"
       ADMIN_EMAIL: admin@tomato.local
       ADMIN_USERNAME: admin
       ADMIN_PASSWORD: admin12345
   mongodb:
     image: mongo:latest
     container_name: mongodb
     ports:
      - "27017:27017"
     environment:
      - MONGO_INITDB_DATABASE=store
     volumes:
      - mongo-db:/data/db
     networks:
      - shop 
   prometheus:
     image: prom/prometheus:latest
     container_name: prometheus
     ports:
      - "9090:9090"
     volumes:
       - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
     networks:
      - shop
     restart: always
     depends_on:
       - backend
       - mongodb
   grafana:
     image: grafana/grafana:latest
     container_name: grafana
     ports:
      - "3002:3000"
     environment:
       - GF_SECURITY_ADMIN_USER=admin
       - GF_SECURITY_ADMIN_PASSWORD=admin
     networks:
      - shop
     restart: always
     depends_on:
      - prometheus
   nginx:
     image: nginx:alpine
     container_name: tomato_https
     ports:
      - "443:443"
      - "8443:8443"
     volumes:
      - ./nginx/https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
     networks:
      - shop
     restart: always
     depends_on:
      - frontend
      - admin
      - backend
      
volumes:
    mongo-db:
networks:
   shop:
